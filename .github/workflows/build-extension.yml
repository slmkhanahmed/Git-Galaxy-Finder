name: Build Extension

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Install Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "22.13.0"

      - name: Install Dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Archive Extension with a workflow
        run: zip -r dist/gehance.zip dist/*

      - name: Tag the repository
        id: tag
        run: |
          # See https://docs.github.com/en/get-started/using-git/dealing-with-special-characters-in-branch-and-tag-names
          TAG=v$(date -Iseconds | sed 's/[T:\+]/-/g')
          echo "$TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          git config user.name "Salman Ahmed Khan"
          git config user.email "slmkhanahmed@gmail.com"
          git tag -a $TAG -m "Published version $TAG" ${GITHUB_SHA}
          git push origin $TAG

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./dist/gehance.zip
          tag_name: ${{ steps.tag.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## Changelog
            $(git log --pretty=format:"%h - %s (%an)" ${{ github.event.before }}..${{ github.sha }})

            ## Extension Details
            - Extension Name: Gehance
            - Version: ${{ github.sha }}
            - Build Date: $(date -u)
            - Browser: chrome, firefox
            - File Type: zip
            - File Size: $(du -sh ./dist/*.zip | cut -f1)

            ## Browser Support
            - Chrome: >= 80
            - Firefox: >= 80
            - Edge: >= 80
